version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_URL=http://localhost:5173
      - JWT_SECRET=supersecretkey
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=file:./dev.db
    volumes:
      - backend_data:/app/prisma

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
